# Netlify build for Next.js (ops-app)
# If repo root is the parent (e.g. School Uniform Solutions), the root netlify.toml is used (base = "ops-app").
# Do NOT set "publish" here — @netlify/plugin-nextjs controls it; setting publish breaks CSS/JS on deploy.

[build]
  command = "npm run build:netlify"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "WOO_URL,NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY"
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"
