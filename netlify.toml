# Build and deploy the ops-app (Next.js). In Netlify UI set Base directory to "ops-app".
# Do not override "Build command" in Netlify UI — leave it blank so this file's command is used.
# Do not set "publish" — @netlify/plugin-nextjs sets it; overriding can break CSS/static assets.
# CRITICAL: Use "npx next build --webpack". Next.js 16 defaults to Turbopack; its output 404s on
# Netlify. The --webpack flag is required for static assets to deploy correctly.

[build]
  base = "ops-app"
  command = "npx next build --webpack"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "WOO_URL,NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY"
  NODE_VERSION = "20"

# Force correct MIME types for Next.js static assets (fixes "text/plain" / strict MIME errors)
[[headers]]
  for = "/_next/static/*.css"
  [headers.values]
    Content-Type = "text/css; charset=utf-8"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/static/*.js"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"
    Cache-Control = "public, max-age=31536000, immutable"

[[plugins]]
  package = "@netlify/plugin-nextjs"
