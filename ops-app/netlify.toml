# Netlify build for Next.js (ops-app)
# If your repo root is the ops-app folder, this is correct.
# If repo root is the parent (e.g. School Uniform Solutions), set Base directory to "ops-app" in Netlify UI.

[build]
  command = "npm run build"
  publish = ".next"

# Allow build to succeed: NEXT_PUBLIC_* and WOO_URL are inlined at build time; omit from secrets scan.
[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "WOO_URL,NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY"

[[plugins]]
  package = "@netlify/plugin-nextjs"
