# Build and deploy the ops-app (Next.js). In Netlify UI set Base directory to "ops-app".
# Do not set "publish" — @netlify/plugin-nextjs sets it; overriding can break CSS/static assets.

[build]
  base = "ops-app"
  command = "npm run build"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "WOO_URL,NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY"
  NODE_VERSION = "20"

# Force correct MIME types for Next.js static assets (fixes "text/plain" / strict MIME errors)
[[headers]]
  for = "/_next/static/*.css"
  [headers.values]
    Content-Type = "text/css; charset=utf-8"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/static/*.js"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"
    Cache-Control = "public, max-age=31536000, immutable"

[[plugins]]
  package = "@netlify/plugin-nextjs"
